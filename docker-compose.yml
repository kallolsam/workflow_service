version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: workflow_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Root@123
      MYSQL_DATABASE: workflow_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRoot@123"]
      timeout: 5s
      retries: 10
      interval: 5s

  app:
    build: .
    container_name: workflow_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://root:Root%40123@db:3306/workflow_db
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
